<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Creda Flux E-Wallet</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="favicon_io/favicon.ico" type="image/x-icon">
    <style>

        :root {
            --dark-bg: #010711;
            --primary-color: #1c77a2;
            --secondary-color: #0c2c47;
            --accent-color: #14cbf4;
            --light-color: #eeeff0;
            --success-color: #14cbf4;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--dark-bg) 50%, var(--secondary-color) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        
        /* Advanced Animated Background */
        .animated-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        
        .floating-card {
            position: absolute;
            background: rgba(20, 203, 244, 0.1);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            border: 1px solid rgba(20, 203, 244, 0.2);
            animation: float 8s ease-in-out infinite;
        }
        
        .floating-card:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            background: linear-gradient(45deg, rgba(20, 203, 244, 0.15), rgba(28, 119, 162, 0.1));
        }
        
        .floating-card:nth-child(2) {
            width: 80px;
            height: 80px;
            top: 70%;
            right: 10%;
            animation-delay: -2s;
            background: linear-gradient(45deg, rgba(28, 119, 162, 0.2), rgba(238, 239, 240, 0.1));
        }
        
        .floating-card:nth-child(3) {
            width: 160px;
            height: 160px;
            bottom: 10%;
            left: 15%;
            animation-delay: -4s;
            background: linear-gradient(45deg, rgba(28, 119, 162, 0.1), rgba(12, 44, 71, 0.15));
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            33% {
                transform: translateY(-30px) rotate(120deg) scale(1.1);
                opacity: 0.9;
            }
            66% {
                transform: translateY(20px) rotate(240deg) scale(0.9);
                opacity: 0.5;
            }
        }
        
        .particle {
            position: absolute;
            background: rgba(20, 203, 244, 0.3);
            border-radius: 50%;
            animation: particleFloat 6s linear infinite;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            animation: slideInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .login-card {
            background: rgba(1, 7, 17, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            padding: 3.5rem 2.5rem;
            box-shadow: 
                0 25px 80px rgba(20, 203, 244, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(20, 203, 244, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-color), var(--primary-color), var(--secondary-color));
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .bank-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(20, 203, 244, 0.3);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }
        
        @keyframes logoPulse {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                box-shadow: 0 8px 32px rgba(20, 203, 244, 0.3);
            }
            50% { 
                transform: scale(1.05) rotate(5deg);
                box-shadow: 0 12px 40px rgba(20, 203, 244, 0.4);
            }
        }
        
        .logo-container i {
            color: white;
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        
        .bank-name {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        
        .bank-tagline {
            color: var(--light-color);
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
            opacity: 0.9;
        }
        
        .login-form {
            margin-bottom: 2.5rem;
        }
        
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: var(--light-color);
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-label i {
            color: var(--accent-color);
            width: 16px;
            transition: all 0.3s ease;
        }
        
        .input-container {
            position: relative;
        }
        
        .form-control {
            width: 100%;
            padding: 1.25rem 3rem 1.25rem 1.5rem;
            border: 2px solid rgba(20, 203, 244, 0.3);
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(12, 44, 71, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white !important;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.7) !important;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(20, 203, 244, 0.1);
            transform: translateY(-2px);
            background: rgba(12, 44, 71, 0.7);
            color: white !important;
        }

        .form-control:hover {
            border-color: rgba(20, 203, 244, 0.5);
            transform: translateY(-1px);
            color: white !important;
        }
        
        .form-control.error {
            border-color: #dc3545 !important;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .form-control:focus + .input-focus-border {
            transform: scaleX(1);
        }
        
        .input-focus-border {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-color), var(--primary-color));
            transform: scaleX(0);
            transition: transform 0.3s ease;
            border-radius: 2px;
        }
        
        /* Password Toggle Styles */
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--light-color);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .password-toggle:hover {
            color: var(--accent-color);
            background: rgba(20, 203, 244, 0.1);
        }
        
        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .password-toggle i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }
        
        .password-toggle.active i {
            color: var(--accent-color);
            transform: scale(1.1);
        }
        
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border: none;
            border-radius: 16px;
            padding: 1.375rem 2rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--light-color);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(20, 203, 244, 0.3);
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(20, 203, 244, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(-1px);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            z-index: 2;
        }
        
        .login-footer {
            border-top: 1px solid rgba(20, 203, 244, 0.2);
            padding-top: 2rem;
            text-align: center;
        }
        
        .security-features {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        
        .security-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            background: rgba(20, 203, 244, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent-color);
            backdrop-filter: blur(10px);
        }
        
        .security-badge i {
            font-size: 1rem;
        }
        
        .support-text {
            color: var(--light-color);
            font-size: 0.9rem;
            margin: 0;
            opacity: 0.8;
        }
        
        /* Loading States */
        .btn-loading {
            pointer-events: none;
        }
        
        .btn-loading .btn-content {
            opacity: 0;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            margin: -12px 0 0 -12px;
            border: 2px solid transparent;
            border-top: 2px solid var(--light-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 3;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Success State */
        .btn-success {
            background: linear-gradient(135deg, var(--accent-color), var(--primary-color));
        }
        
        /* Flash Messages */
        .flash-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }
        
        .alert {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Test credentials panel */
        .test-credentials {
            background: rgba(20, 203, 244, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(20, 203, 244, 0.2);
        }
        
        .test-credentials h6 {
            color: var(--light-color);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .test-credential {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(20, 203, 244, 0.1);
        }
        
        .test-credential:last-child {
            border-bottom: none;
        }
        
        .credential-type {
            color: rgba(238, 239, 240, 0.8);
            font-size: 0.8rem;
        }
        
        .credential-value {
            color: var(--light-color);
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .copy-btn {
            background: rgba(20, 203, 244, 0.2);
            border: none;
            color: var(--light-color);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background: rgba(20, 203, 244, 0.3);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: rgba(20, 203, 244, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(20, 203, 244, 0.3);
            margin: 0 auto 1rem;
            overflow: hidden;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        @media (max-width: 768px) {
            .login-container {
                padding: 0.5rem;
            }
            
            .login-card {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }
            
            .bank-name {
                font-size: 2rem;
            }
            
            .bank-tagline {
                font-size: 1rem;
            }
            
            .logo-container {
                width: 70px;
                height: 70px;
            }
            
            .logo-container i {
                font-size: 1.75rem;
            }
            
            .form-control {
                padding: 1.125rem 2.5rem 1.125rem 1.25rem;
            }
            
            .password-toggle {
                right: 0.75rem;
                padding: 0.375rem;
            }
            
            .btn-login {
                padding: 1.25rem 1.5rem;
            }
            
            .security-features {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .floating-card {
                display: none;
            }
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.25rem;
            }
            
            .bank-header {
                margin-bottom: 2.5rem;
            }
            
            .bank-name {
                font-size: 1.75rem;
            }
            
            .form-group {
                margin-bottom: 1.5rem;
            }
            
            .form-control {
                padding: 1rem 2.25rem 1rem 1rem;
            }
        }
    </style>
    
    <!-- Flash Messages Container -->

    <script>
        // API Configuration
        const API_BASE_URL = 'https://scbanking.pythonanywhere.com/api';
        
        // Store user data
        let currentUser = null;

        // Generate floating particles
        function createParticles() {
            const bg = document.getElementById('animatedBg');
            const particleCount = window.innerWidth < 768 ? 8 : 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 1;
                const left = Math.random() * 100;
                const delay = Math.random() * 6;
                const duration = Math.random() * 4 + 4;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}vw`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.animationDuration = `${duration}s`;
                
                bg.appendChild(particle);
            }
        }

        // Password toggle functionality
        function initPasswordToggle() {
            const passwordToggle = document.getElementById('passwordToggle');
            const passwordInput = document.getElementById('password');
            
            if (passwordToggle) {
                passwordToggle.addEventListener('click', function() {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    
                    if (isPassword) {
                        this.innerHTML = '<i class="fas fa-eye-slash"></i>';
                        this.classList.add('active');
                    } else {
                        this.innerHTML = '<i class="fas fa-eye"></i>';
                        this.classList.remove('active');
                    }
                    
                    passwordInput.focus();
                });
            }
        }

        // Show flash message
        function showFlashMessage(message, type = 'success') {
            const flashContainer = document.getElementById('flashContainer');
            const alertClass = type === 'error' ? 'alert-danger' : 'alert-success';
            const iconClass = type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle';
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${alertClass} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                <i class="fas ${iconClass} me-2"></i>
                <strong>${type === 'error' ? 'Error!' : 'Success!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            
            flashContainer.appendChild(alertDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.remove();
                }
            }, 5000);
        }

        // Fill test credentials
        function fillCredentials(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            showFlashMessage(`Credentials filled for: ${username}`, 'success');
            
            // Optional: Auto-submit after filling
            // setTimeout(() => {
            //     document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            // }, 500);
        }

        // Test backend connection
        async function testBackendConnection() {
            try {
                console.log('🧪 Testing backend connection...');
                const response = await fetch(`${API_BASE_URL}/test`, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include'
                });
                const data = await response.json();
                console.log('✅ Backend connection test:', data);
                showFlashMessage('Connected to server successfully!', 'success');
                return true;
            } catch (error) {
                console.error('❌ Backend connection test failed:', error);
                showFlashMessage('Cannot connect to server. Please check your internet connection.', 'error');
                return false;
            }
        }

        // Check if user is already logged in
        async function checkAuth() {
            try {
                console.log('🔍 Checking authentication status...');
                const response = await fetch(`${API_BASE_URL}/check_auth`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                console.log('📡 Auth check status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('📦 Auth check data:', data);
                    
                    if (data.success && data.user) {
                        console.log('✅ User already authenticated:', data.user.username);
                        currentUser = data.user;
                        
                        // Store user data in localStorage
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        showFlashMessage(`Welcome back, ${data.user.name}! Redirecting...`, 'success');
                        
                        // Redirect after delay
                        setTimeout(() => {
                            if (data.user.is_admin) {
                                window.location.href = 'admin_dashboard.html';
                            } else {
                                window.location.href = 'user_dashboard.html';
                            }
                        }, 1500);
                    }
                }
            } catch (error) {
                console.log('🔐 Not authenticated or auth check failed:', error.message);
            }
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            // Remove error styling
            usernameInput.classList.remove('error');
            passwordInput.classList.remove('error');
            
            // Basic validation
            if (!username) {
                showFlashMessage('Please enter your username', 'error');
                usernameInput.classList.add('error');
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                showFlashMessage('Please enter your password', 'error');
                passwordInput.classList.add('error');
                passwordInput.focus();
                return;
            }
            
            // Add loading state
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            
            try {
                console.log('🔍 Attempting login with username:', username);
                console.log('🌐 Making request to:', `${API_BASE_URL}/login`);
                
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                console.log('📡 Response status:', response.status);
                
                const data = await response.json();
                console.log('📦 Response data:', data);
                
                if (data.success && data.user) {
                    showFlashMessage(`Welcome back, ${data.user.name}! Redirecting...`, 'success');
                    loginBtn.classList.add('btn-success');
                    
                    // Store user data
                    currentUser = data.user;
                    localStorage.setItem('user', JSON.stringify(data.user));
                    sessionStorage.setItem('lastLogin', new Date().toISOString());
                    
                    // Redirect based on user type
                    setTimeout(() => {
                        if (data.user.is_admin) {
                            window.location.href = 'admin_dashboard.html';
                        } else {
                            window.location.href = 'user_dashboard.html';
                        }
                    }, 1500);
                } else {
                    showFlashMessage(data.message || 'Login failed. Please check your credentials.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('btn-loading');
                    
                    // Highlight the password field on failure
                    passwordInput.classList.add('error');
                    passwordInput.value = ''; // Clear password for security
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('❌ Login error details:', error);
                
                // More specific error messages
                if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                    showFlashMessage('Cannot connect to server. Please check your internet connection and try again.', 'error');
                } else if (error.message.includes('Network request failed')) {
                    showFlashMessage('Network error. Please check your connection and try again.', 'error');
                } else if (error.message.includes('JSON')) {
                    showFlashMessage('Server returned an invalid response. Please try again later.', 'error');
                } else {
                    showFlashMessage('Login failed: ' + error.message, 'error');
                }
                
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
            }
        });

        // Add enter key support for login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Login page initialized');
            console.log('📍 Current domain:', window.location.origin);
            console.log('🔗 API Base URL:', API_BASE_URL);
            
            createParticles();
            initPasswordToggle();
            
            // Add floating cards
            const bg = document.getElementById('animatedBg');
            for (let i = 0; i < 3; i++) {
                const card = document.createElement('div');
                card.className = 'floating-card';
                bg.appendChild(card);
            }
            
            // Check for newly registered account
            const newAccountNumber = sessionStorage.getItem('newAccountNumber');
            if (newAccountNumber) {
                showFlashMessage(`Account created successfully! Account Number: ${newAccountNumber}. Please login.`, 'success');
                sessionStorage.removeItem('newAccountNumber');
            }
            
            // Test backend connection
            await testBackendConnection();
            
            // Check if user is already logged in
            await checkAuth();
        });

        // Handle window resize
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const bg = document.getElementById('animatedBg');
                bg.innerHTML = '';
                createParticles();
            }, 250);
        });
    </script>
    
    <!-- Bootstrap JS for alerts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
