<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CredaFlux Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='static/css/styles.css') }}">

</head>
<body>

<div class="container">

    <div class="left-panel">

        <div>
            <h1>Secure Wealth Infrastructure</h1>

            <p>
                Secure, fast and reliable transfers bill payment and top up anytime
            </p>
        </div>

    </div>

    <div class="right-panel">

        <h2>Create CredaFlux Account</h2>

        <p class="subtitle">
            Complete your secure onboarding process
        </p>

        <form id="registerForm" enctype="multipart/form-data">

            <div class="form-group">
                <label>Full Legal Name</label>

                <input
                    type="text"
                    name="fullLegalName"
                    placeholder="e.g., Alexander Sterling"
                    required
                >
            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Email Address</label>

                    <input
                        type="email"
                        name="email"
                        placeholder="alexander@enterprise.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>

                    <input
                        type="text"
                        name="mobileNumber"
                        placeholder="+1 212 555 0198"
                    >
                </div>

            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Legal Gender</label>

                    <select name="legalGender">

                        <option>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>

                    <input
                        type="date"
                        name="dateOfBirth"
                    >
                </div>

            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Primary Occupation</label>

                    <input
                        type="text"
                        name="primaryOccupation"
                        placeholder="e.g., Managing Director"
                    >
                </div>

                <div class="form-group">
                    <label>Place of Birth</label>

                    <input
                        type="text"
                        name="placeOfBirth"
                        placeholder="e.g., Geneva, Switzerland"
                    >
                </div>

            </div>

            <div class="form-group">
                <label>Current Residence</label>

                <input
                    type="text"
                    name="currentResidence"
                    placeholder="e.g., London, UK"
                >
            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Portfolio Type</label>

                    <select name="portfolioType">

                        <option>Select Account Type</option>
                        <option>Personal</option>
                        <option>Business</option>
                        <option>Private Wealth</option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Base Currency</label>

                    <select name="baseCurrency">

                        <option>US Dollar (USD)</option>
                        <option>HUF (HUF)</option>

                    </select>
                </div>

            </div>

            <div class="grid">

                <div class="form-group">
                    <label>Master Password</label>

                    <input
                        type="password"
                        name="masterPassword"
                        placeholder="••••••••"
                    >
                </div>

                <div class="form-group">
                    <label>4-Digit App PIN</label>

                    <input
                        type="password"
                        name="appPin"
                        maxlength="4"
                        placeholder="••••"
                    >
                </div>

            </div>

            <div class="form-group">
                <label>Confirm App PIN</label>

                <input
                    type="password"
                    name="confirmPin"
                    maxlength="4"
                    placeholder="••••"
                >
            </div>

            <div class="form-group">

                <label>Government ID / Profile Photo</label>

                <div class="upload-box">

                    <input
                        type="file"
                        name="governmentId"
                        accept=".jpg,.jpeg,.png,.svg"
                    >

                    <p>Click to upload securely</p>

                    <span>
                        SVG, PNG, JPG (Max. 5MB)
                    </span>

                </div>

            </div>

            <button type="submit">
                Initialize Vault
            </button>

            <div class="bottom-text">
                Already have an account?
                <a href="https://credaflux.online/login.html">Sign In</a>
            </div>

        </form>

    </div>

</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
