<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredaFlux Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:1200px;
    background:#ffffff;
    border-radius:24px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1.2fr;
    box-shadow:0 15px 50px rgba(15,23,42,0.08);
}

.left-panel{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    padding:70px 50px;
    color:white;
    display:flex;
    align-items:center;
}

.left-panel h1{
    font-size:48px;
    line-height:1.2;
    margin-bottom:20px;
    font-weight:700;
}

.left-panel p{
    color:#dbeafe;
    line-height:1.8;
    font-size:16px;
}

.right-panel{
    padding:50px;
    background:white;
}

.right-panel h2{
    color:#0f172a;
    font-size:34px;
    margin-bottom:10px;
    font-weight:700;
}

.subtitle{
    color:#64748b;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    color:#334155;
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
}

input,select{
    width:100%;
    padding:15px;
    border:1px solid #dbe2ea;
    border-radius:14px;
    background:#f8fafc;
    outline:none;
    font-size:15px;
}

input:focus,select:focus{
    border-color:#2563eb;
    background:white;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.upload-box{
    border:2px dashed #cbd5e1;
    border-radius:16px;
    padding:35px;
    text-align:center;
    position:relative;
    background:#f8fafc;
}

.upload-box input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1d4ed8;
}

.bottom-text{
    text-align:center;
    margin-top:25px;
    color:#64748b;
}

.bottom-text a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:900px){
    .container{grid-template-columns:1fr;}
    .left-panel{display:none;}
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<div class="left-panel">
    <div>
        <h1>Secure Wealth Infrastructure</h1>
        <p>Secure, fast and reliable transfers, bill payment and top up anytime</p>
    </div>
</div>

<div class="right-panel">

<h2>Create CredaFlux Account</h2>
<p class="subtitle">Complete your secure onboarding process</p>

<form id="registerForm" enctype="multipart/form-data">

    <div class="form-group">
        <label>Full Legal Name</label>
        <input type="text" name="fullLegalName" required>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" name="mobileNumber">
        </div>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Gender</label>
            <select name="legalGender">
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dateOfBirth">
        </div>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Occupation</label>
            <input type="text" name="primaryOccupation">
        </div>

        <div class="form-group">
            <label>Place of Birth</label>
            <input type="text" name="placeOfBirth">
        </div>
    </div>

    <div class="form-group">
        <label>Residence</label>
        <input type="text" name="currentResidence">
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Account Type</label>
            <select name="portfolioType">
                <option>Personal</option>
                <option>Business</option>
            </select>
        </div>

        <div class="form-group">
            <label>Currency</label>
            <select name="baseCurrency">
                <option>USD</option>
                <option>HUF</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="masterPassword" required>
        </div>

        <div class="form-group">
            <label>PIN</label>
            <input type="password" name="appPin" maxlength="4" required>
        </div>
    </div>

    <div class="form-group">
        <label>Confirm PIN</label>
        <input type="password" name="confirmPin" maxlength="4" required>
    </div>

    <div class="form-group">
        <label>Upload ID</label>
        <div class="upload-box">
            <input type="file" name="governmentId">
            <p>Click to upload</p>
            <span>PNG, JPG (Max 5MB)</span>
        </div>
    </div>

    <button type="submit" id="submitBtn">Initialize Vault</button>

    <div class="bottom-text">
        Already have an account? <a href="login.html">Sign In</a>
    </div>

</form>

</div>
</div>

<script>
const API_BASE_URL = "https://scbanking.pythonanywhere.com/api";

const registerForm = document.getElementById("registerForm");
const btn = document.getElementById("submitBtn");

registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    btn.innerText = "Creating...";
    btn.disabled = true;

    const formData = new FormData(registerForm);

    const pin = formData.get("appPin");
    const confirmPin = formData.get("confirmPin");

    // VALIDATION
    if (pin !== confirmPin) {
        alert("PIN does not match");
        resetBtn();
        return;
    }

    if (pin.length !== 4) {
        alert("PIN must be 4 digits");
        resetBtn();
        return;
    }

    try {
        const res = await fetch(`${API_BASE_URL}/register`, {
            method: "POST",
            body: formData,
            credentials: "include"
        });

        const data = await res.json();

        if (data.success) {
            alert("Account created successfully!");

            // redirect to login
            window.location.href = "login.html";

        } else {
            alert(data.message || "Registration failed");
        }

    } catch (err) {
        console.log(err);
        alert("Server error. Try again later.");
    }

    resetBtn();
});

function resetBtn() {
    btn.innerText = "Initialize Vault";
    btn.disabled = false;
}
</script>

</body>
</html>
