<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredaFlux Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f4f7fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:1200px;
    background:#ffffff;
    border-radius:24px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1.2fr;
    box-shadow:0 15px 50px rgba(15,23,42,0.08);
}

.left-panel{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    padding:70px 50px;
    color:white;
    display:flex;
    align-items:center;
}

.left-panel h1{
    font-size:48px;
    line-height:1.2;
    margin-bottom:20px;
}

.left-panel p{
    color:#dbeafe;
    line-height:1.8;
}

.right-panel{
    padding:50px;
}

h2{
    font-size:34px;
    margin-bottom:10px;
}

.subtitle{
    color:#64748b;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input,select{
    width:100%;
    padding:15px;
    border:1px solid #dbe2ea;
    border-radius:14px;
    background:#f8fafc;
    outline:none;
}

input:focus,select:focus{
    border-color:#2563eb;
    background:#fff;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:#64748b;
}

.bottom-text a{
    color:#2563eb;
    text-decoration:none;
}

@media(max-width:900px){
    .container{grid-template-columns:1fr;}
    .left-panel{display:none;}
    .grid{grid-template-columns:1fr;}
}
</style>

</head>
<body>

<div class="container">

    <div class="left-panel">
        <div>
            <h1>Secure Wealth Infrastructure</h1>
            <p>Secure, fast and reliable transfers anytime</p>
        </div>
    </div>

    <div class="right-panel">

        <h2>Create Account</h2>
        <p class="subtitle">Complete registration</p>

        <form id="registerForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Currency</label>
                    <select name="currency">
                        <option value="USD">USD</option>
                        <option value="HUF">HUF</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Bank Name</label>
                    <input type="text" name="bank_name">
                </div>
            </div>

            <div class="form-group">
                <label>4-Digit PIN</label>
                <input type="password" name="pin" maxlength="4" required>
            </div>

            <button type="submit">Initialize Vault</button>

            <div class="bottom-text">
                Already have account? <a href="/login.html">Sign In</a>
            </div>

        </form>

    </div>
</div>

<script>
const registerForm = document.getElementById("registerForm");

registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = registerForm.querySelector("button");
    btn.disabled = true;
    btn.innerText = "Creating...";

    const formData = new FormData(registerForm);

    const data = {
        name: formData.get("name"),
        username: formData.get("username"),
        password: formData.get("password"),
        currency: formData.get("currency"),
        bank_name: formData.get("bank_name"),
        pin: formData.get("pin")
    };

    try {
        const res = await fetch("/api/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data),
            credentials: "include"
        });

        const result = await res.json();

        if (result.success) {
            alert("Account created successfully");
            window.location.href = "/login.html";
        } else {
            alert(result.message);
        }

    } catch (err) {
        alert("Server error");
    }

    btn.disabled = false;
    btn.innerText = "Initialize Vault";
});
</script>

</body>
</html>
